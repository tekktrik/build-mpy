name: 'Build package of .mpy files'
description: 'Build mpy-cross for usage in GitHub Actions'
inputs:
  github-token:
    description: 'Your GitHub token, needed to upload the ZIP file'
    required: true
  circuitpy-version:
    description: 'The version of CircuitPython to use'
    required: true
  zip-filename:
    description: 'The name of the ZIP file to attach'
    required: true
    default: "mpy-release.zip"
  mpy-directory:
    description: >
      The directory to look for files to compile with mpy-cross.  If none
      is provided, the root directory will be used. This also becomes the
      basis for filepaths in the mpy manifest file, if one is provided.
    required: true
    default: "."
  mpy-manifest-file:
    description: >
      Path to a manifest file containing filepaths to convert. If no
      manifest is provided, all applicable files will be converted.
    required: true
    default: ""
  mpy-manifest-type:
    description: >
      The type of manifest to use for compiling if one is provided. The
      default is "include", but if "exclude" is provided, then all Python
      files EXCEPT the ones listed will be compiled with mpy-cross.
    required: true
    default: "include"
  zip-directory:
    description: >
      The directory of files to bundle.  If none is provided, the root
      directory will be used.  This also becomes the basis for filepaths
      in the zip manifest file, if one is provided.
    required: true
    default: "."
  zip-manifest-file:
    description: >
      Path to a manifest file containing filepaths to include in the zip
      file. If no manifest is provided, all files will be included. Either
      this or exclude-zip-manifest can be defined.
    required: true
    default: ""
  zip-manifest-type:
    description: >
      The type of manifest to use for zipping, if one is provided. The
      default is "include", but if "exclude" is provided, then all files
      EXCEPT the ones listed will be zipped.
    required: true
    default: "include"
  compiler-directory:
    description: >
      The directory where the mpy-cross compiler will be downloaded.
    required: true
    default: "circuitpy-compiler"
runs:
  using: "composite"
  steps:
    - name: Install zip
      shell: bash
      run: |
        sudo apt install zip
    - name: Install build tools
      shell: bash
      run: |
        sudo apt install build-essential
        sudo add-apt-repository ppa:pybricks/ppa
        sudo apt install git gettext uncrustify
    - name: Download mpy-cross
      shell: bash
      run: |
        mkdir ${{ inputs.compiler-directory }}
        cd ${{ inputs.compiler-directory }}
        BASE_NEW="https://adafruit-circuit-python.s3.amazonaws.com/bin/mpy-cross/linux-amd64"
        BASE_OLD="https://adafruit-circuit-python.s3.amazonaws.com/bin/mpy-cross"
        VER="${{ inputs.circuitpy-version }}"
        OUT="mpy-cross"

        set -euo pipefail

        # Try modern name in modern folder
        URL="$BASE_NEW/mpy-cross-linux-amd64-$VER.static"
        if curl -fsI "$URL" >/dev/null; then
          curl -fL "$URL" -o "$OUT"
        else
          # Try legacy name in legacy folder
          URL="$BASE_OLD/mpy-cross.static-amd64-linux-$VER"
          if curl -fsI "$URL" >/dev/null; then
            curl -fL "$URL" -o "$OUT"
          else
            # Last resort: list and match either pattern in linux-amd64, then legacy
            esc_ver="$(printf '%s' "$VER" | sed -e 's/[.[\\*^$()+?{}|]/\\&/g')"

            for IDX in \
              "$BASE_NEW/?delimiter=/ $BASE_NEW" \
              "$BASE_OLD/?delimiter=/ $BASE_OLD"
            do
              # If direct URLs fail, list the files in the new place; if no match, list the old place; grab the first filename that starts with your version (new or old pattern); otherwise error out.
              BASE="${IDX##* }"
              IDX="${IDX%% *}"
              html="$(curl -fsSL "${IDX%% *}")"
              cand="$(printf '%s' "$html" | grep -o "mpy-cross-linux-amd64-${esc_ver}[^\"']*\.static" | head -n1)"
              [ -z "$cand" ] && cand="$(printf '%s' "$html" | grep -o "mpy-cross\.static-amd64-linux-${esc_ver}" | head -n1)"
              if [ -n "$cand" ]; then
                curl -fL "${IDX##* }/$cand" -o "$OUT"
                break
              fi
            done

            [ -f "$OUT" ] || { echo "No mpy-cross found for $VER"; exit 1; }
          fi
        fi

        chmod +x "$OUT"
    - name: Compile MPY files
      shell: bash
      run: |
        echo "Compiling using mpy-cross version ${{ inputs.circuitpy-version }}"
        # Read MPY manifest file contents, if needed
        if [[ "${{ inputs.mpy-manifest-file }}" != "" ]]
        then
          readarray mpymanifestfiles < "${{ inputs.mpy-manifest-file }}"
          for file in ${mpymanifestfiles[@]}
          do
            if [[ $file = *[[:space:]]* ]] || [[ $file == "#*" ]]
            then
              mpymanifestfiles=( $"{mpymanifestfiles[@]/$file}" )
            fi
          done
        fi

        # Compile MPY files
        mpyresults=()
        prempyfiles=()
        pyfiles=$(find ${{ inputs.mpy-directory }} -name "*.py" ! -name "code.py" -printf '%P\n')
        for file in ${pyfiles[@]}
        do
          if [[ "${{ inputs.mpy-manifest-file }}" == "" ]] || \
             [[ ( "${{ inputs.mpy-manifest-type }}" == "include" && "${mpymanifestfiles[*]}" =~ "${file}" ) || \
              ( "${{ inputs.mpy-manifest-type }}" == "exclude" && ! "${mpymanifestfiles[*]}" =~ "${file}" ) ]]
          then
            echo "Compiling $file"
            outputmpy="${{ inputs.mpy-directory }}/${file%.*}.mpy"
            mpyresults+=("$outputmpy")
            prempyfile="${{ inputs.mpy-directory }}/$file"
            prempyfiles+=("$prempyfile")
            ${{ inputs.compiler-directory }}/mpy-cross $prempyfile -o $outputmpy
          fi
        done

        # Read ZIP manifest file contents, if needed
        if [[ "${{ inputs.zip-manifest-file }}" != "" ]]
        then
          readarray zipmanifestfiles < "${{ inputs.zip-manifest-file }}"
          for file in ${zipmanifestfiles[@]}
          do
            if [[ $file = *[[:space:]]* ]] || [[ $file == "#*" ]]
            then
              zipmanifestfiles=( $"{zipmanifestfiles[@]/$file}" )
            fi
          done
        fi

        # Zip files
        zipresults=()
        allfiles=$(find ${{ inputs.zip-directory }} -type f ! -path "./.git/*" -printf '%P\n')
        for file in ${allfiles[@]}
        do

          if [[ "${{ inputs.zip-manifest-file }}" == "" ]] || \
             [[ ( "${{ inputs.zip-manifest-type }}" == "include" && "${zipmanifestfiles[*]}" =~ "${file}" ) || \
              ( "${{ inputs.zip-manifest-type }}" == "exclude" && ! "${zipmanifestfiles[*]}" =~ "${file}" ) ]]
          then
            potentialmpy="${file%.*}.mpy"
            potentialfile="$file"
            if [[ "${{ inputs.zip-directory }}" != "." ]]
            then
              potentialmpy="${{ inputs.zip-directory }}/$potentialmpy"
              potentialfile="${{ inputs.zip-directory }}/$file"
            fi

            if [[ "${prempyfiles[*]}" =~ "${potentialfile}" ]]
            then
              continue
            fi

            if [[ "${mpyresults[*]}" =~ "${potentialmpy}" ]] && [[ ! -a "$file" ]]
            then
              zipresults+=("$potentialmpy")
            else
              zipresults+=("$potentialfile")
            fi
          fi
        done

        # Create the ZIP file
        zip ${{ inputs.zip-filename }} "${zipresults[@]}"

        # Delete MPY files
        for file in ${mpyresults[@]}
        do
          echo "Deleting $file"
          rm $file
        done
    - name: Upload ZIP file to release
      uses: shogo82148/actions-upload-release-asset@v1
      with:
        asset_path: ${{ inputs.zip-filename }}
        github_token: ${{ inputs.github-token }}
        upload_url: ${{ github.event.release.upload_url }}
    - name: Delete ZIP file
      shell: bash
      run: |
        rm ${{ inputs.zip-filename }}
